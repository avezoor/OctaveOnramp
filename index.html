<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Modul Pemrograman Dasar Octave</title>
  <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Orbitron:wght@500;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  <link rel="stylesheet" href="./style.css?v=20260420-1" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar" id="sidebar" aria-label="Navigasi modul">
      <div class="sidebar-head">
        <div>
          <div class="brand">Daftar Materi</div>
          <p class="subtitle">Modul Belajar Interaktif</p>
        </div>
        <button id="closeSidebarBtn" class="icon-btn" type="button" aria-label="Tutup menu">×</button>
      </div>
      <nav id="moduleList" class="module-list"></nav>
    </aside>
    <button id="sidebarOverlay" class="sidebar-overlay" type="button" aria-label="Tutup menu"></button>
    <button id="tocOverlay" class="toc-overlay" type="button" aria-label="Tutup daftar isi"></button>
    <button id="tocToggleBtn" class="toc-toggle-btn" type="button" aria-label="Buka daftar isi" aria-expanded="false">
      <span class="list-icon" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </span>
    </button>
    <button id="scrollTopBtn" class="scroll-top-btn" type="button" aria-label="Kembali ke atas">
      <span aria-hidden="true">↑</span>
    </button>
    <div id="readingProgress" class="reading-progress loading" aria-hidden="true">
      <span id="readingProgressFill" class="reading-progress-fill"></span>
    </div>

    <main class="main">
      <header class="topbar">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Buka menu modul" aria-expanded="false">☰</button>
        <h1 id="pageTitle">Modul Pemrograman Dasar Octave</h1>
        <div class="topbar-actions">
          <button
            id="fullscreenBtn"
            class="topbar-action-btn"
            type="button"
            aria-label="Masuk mode layar penuh"
            aria-pressed="false"
            title="Layar penuh"
          >
            <span class="topbar-action-icon" aria-hidden="true">⛶</span>
            <span class="topbar-action-text">Fullscreen</span>
          </button>
          <div id="currentDateInfo" class="topbar-date" aria-label="Tanggal hari ini">Memuat tanggal...</div>
        </div>
      </header>

      <div class="content-layout">
        <article id="content" class="content">
          <p>Memuat materi...</p>
        </article>

        <aside id="tocBox" class="toc-box" role="dialog" aria-modal="true" aria-label="Daftar isi modul">
          <div class="toc-head">
            <h2>Daftar Isi</h2>
            <button id="closeTocBtn" class="icon-btn toc-close-btn" type="button" aria-label="Tutup daftar isi">×</button>
          </div>
          <nav id="toc"></nav>
        </aside>
      </div>

      <footer class="site-footer">
        <p>
          By
          <a href="https://github.com/avezoor" target="_blank" rel="noopener noreferrer">avezoor</a>
        </p>
      </footer>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
  <script src="./content-data.js?v=20260420-1"></script>
  <script src="./app.js?v=20260420-1"></script>
</body>
</html>
